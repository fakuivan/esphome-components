
# First cut: only 0x4F, 0x42 and 0x92 are implemented.
# Returning {} from any required lambda causes the packet response to be a
# CommunicationError (0x91).
# All values use protocol units directly to avoid runtime float conversion.

pylontech_rs485_battery_emulator:
  id: battery_emulator
  uart_id: <>
  protocol_version: 0x20
  packs:
    - battery_number: 1
      analog_values:
        # mV per cell
        cell_voltages: !lambda |-
          return esphome::StaticVector<uint16_t, 16>{3300, 3301, 3299, 3300,
                                                     3302, 3301, 3298, 3300,
                                                     3300, 3301, 3299, 3300,
                                                     3301, 3300, 3299, 3300};
        # deci-Kelvin
        bms_temperature: !lambda return 2981;
        # deci-Kelvin, additional probes after the BMS temperature
        cell_temperatures: !lambda |-
          return esphome::StaticVector<uint16_t, 8>{2982, 2980, 2979, 2981};
        # signed deci-amps, positive = charge, negative = discharge
        current: !lambda return -40;
        # mV
        voltage: !lambda return 52800;
        # mAh (0.001 Ah units)
        remaining_capacity: !lambda return 35000;
        # mAh (0.001 Ah units)
        module_capacity: !lambda return 50000;
        cycles: !lambda return 120;
      charge_discharge_management_info:
        charge_voltage_upper_limit: !lambda return 56000;
        discharge_voltage_lower_limit: !lambda return 47000;
        max_charge_current: !lambda return 250;
        max_discharge_current: !lambda return 500;
        status_flags:
          charge_enable: !lambda return true;
          discharge_enable: !lambda return true;
          force_charge_1: !lambda return false;
          force_charge_2: !lambda return false;
          full_charge_request: !lambda return false;
